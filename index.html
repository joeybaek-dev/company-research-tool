<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>기업 리서치 툴</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Apple SD Gothic Neo",Pretendard,sans-serif;background:#f1f5f9;min-height:100vh;padding:20px}
.wrap{max-width:1000px;margin:0 auto}
.header{background:linear-gradient(135deg,#0f172a,#1e40af);border-radius:16px;padding:20px 26px;margin-bottom:16px;color:#fff}
.header h1{font-size:20px;font-weight:800}
.header p{margin-top:5px;opacity:.8;font-size:13px}
.badge-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.badge{font-size:11px;padding:3px 10px;border-radius:20px}
.tabs{display:flex;gap:8px;margin-bottom:16px}
.tab{padding:9px 20px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:13px;background:#fff;color:#64748b;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.tab.active{background:#1e40af;color:#fff;box-shadow:0 2px 8px rgba(30,64,175,.25)}
.card{background:#fff;border-radius:14px;padding:20px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card h2{font-size:14px;font-weight:700;color:#1e293b;margin-bottom:12px}
input[type=text],input[type=number],select{padding:8px 12px;border-radius:8px;border:1.5px solid #e2e8f0;font-size:13px;font-family:inherit}
input[type=text]:focus,input[type=number]:focus,select:focus{outline:none;border-color:#1e40af}
.search-input{width:100%;padding:11px 14px;border-radius:10px;font-size:14px;margin-bottom:14px}
.filter-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.filter-item{flex:1;min-width:120px}
.filter-item label{font-size:11px;color:#94a3b8;display:block;margin-bottom:3px}
.filter-item select{width:100%}
.sort-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.sort-btn{padding:5px 12px;border-radius:20px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:#f1f5f9;color:#64748b}
.sort-btn.active{background:#1e40af;color:#fff}
.result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.company-card{background:#fff;border-radius:12px;padding:16px 18px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:2px solid transparent;transition:border-color .2s}
.company-card.saved{border-color:#1e40af}
.company-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px}
.company-name{font-weight:800;font-size:16px;color:#0f172a}
.company-meta{font-size:12px;color:#64748b;margin-top:4px}
.tag{font-size:11px;padding:2px 8px;border-radius:20px;display:inline-block}
.metrics{display:flex;gap:16px;margin-top:8px;flex-wrap:wrap}
.metric .label{font-size:10px;color:#94a3b8}
.metric .value{font-size:14px;font-weight:800}
.kw-tags{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.kw-tag{font-size:11px;padding:2px 8px;border-radius:20px;background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;cursor:pointer}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:13px}
.btn-primary{background:#1e40af;color:#fff}
.btn-outline{background:#fff;color:#1e40af;border:1.5px solid #1e40af}
.btn-green{background:#10b981;color:#fff}
.btn-red{background:#fff;color:#ef4444;border:1.5px solid #fca5a5}
.btn-sm{padding:6px 12px;font-size:12px}
.stats{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.stat{flex:1;min-width:90px;background:#fff;border-radius:10px;padding:10px 14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.stat .num{font-size:20px;font-weight:800}
.stat .lbl{font-size:12px;color:#64748b}
.loading{text-align:center;padding:60px;color:#94a3b8}
.spinner{width:36px;height:36px;border:4px solid #e0e7ff;border-top-color:#1e40af;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px;color:#94a3b8}
.error-msg{background:#fee2e2;border-radius:10px;padding:12px 16px;color:#b91c1c;font-size:13px;margin-bottom:14px}
.progress{font-size:12px;color:#64748b;margin-top:8px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:8px 12px;text-align:right;font-weight:700;color:#64748b;border-bottom:2px solid #e2e8f0;background:#f8fafc;white-space:nowrap}
th:first-child{text-align:left}
td{padding:10px 12px;text-align:right;border-bottom:1px solid #f1f5f9}
td:first-child{text-align:left;font-weight:700}
.hidden{display:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>🏢 기업 리서치 & 리스트업 툴</h1>
    <p>DART 재무정보 + 뉴스 기반으로 원하는 기업을 필터링·정렬·리스트업</p>
    <div class="badge-row">
      <span class="badge" style="background:#3b82f633;color:#93c5fd;border:1px solid #3b82f655">📊 DART 재무정보 연동</span>
      <span class="badge" style="background:#10b98133;color:#6ee7b7;border:1px solid #10b98155">📰 뉴스 핫기업 분석</span>
      <span class="badge" style="background:#f59e0b33;color:#fcd34d;border:1px solid #f59e0b55">🏛️ 공공데이터 연동</span>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('search')">🔍 기업 검색</button>
    <button class="tab" id="tab-saved" onclick="switchTab('saved')">📋 저장 리스트 (0)</button>
  </div>

  <!-- 검색 탭 -->
  <div id="panel-search">
    <div class="card">
      <input type="text" class="search-input" id="keyword" placeholder="🔍 키워드 검색 (예: 바이오, 반도체, AI, 헬스케어...)" oninput="onFilterChange()"/>
      <div class="filter-row">
        <div class="filter-item">
          <label>업종 (KSIC)</label>
          <select id="f-industry" onchange="onFilterChange()">
            <option value="">전체</option>
            <option value="A">농업·임업·어업</option>
            <option value="B">광업</option>
            <option value="C">제조업</option>
            <option value="D">전기·가스·수도</option>
            <option value="E">하수·폐기물</option>
            <option value="F">건설업</option>
            <option value="G">도매·소매업</option>
            <option value="H">운수·창고업</option>
            <option value="I">숙박·음식업</option>
            <option value="J">정보통신업</option>
            <option value="K">금융·보험업</option>
            <option value="L">부동산업</option>
            <option value="M">전문·과학·기술</option>
            <option value="N">사업시설관리</option>
            <option value="Q">보건·사회복지</option>
          </select>
        </div>
        <div class="filter-item">
          <label>기업 규모</label>
          <select id="f-size" onchange="onFilterChange()">
            <option value="">전체</option>
            <option value="large">대기업 (매출 1조+)</option>
            <option value="mid">중견 (매출 1000억+)</option>
            <option value="small">중소 (매출 1000억 미만)</option>
          </select>
        </div>
        <div class="filter-item">
          <label>최소 매출 (억원)</label>
          <input type="number" id="f-min-revenue" placeholder="예: 100" oninput="onFilterChange()" style="width:100%"/>
        </div>
        <div class="filter-item">
          <label>정렬 기준</label>
          <select id="f-sort" onchange="onFilterChange()">
            <option value="revenue_desc">매출액 높은 순</option>
            <option value="revenue_asc">매출액 낮은 순</option>
            <option value="employees_desc">임직원 많은 순</option>
            <option value="name_asc">기업명 가나다순</option>
          </select>
        </div>
      </div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="loadDARTData()">🔄 DART 데이터 불러오기</button>
        <button class="btn btn-outline" onclick="loadNewsRanking()">🔥 뉴스 핫기업 분석</button>
        <span id="load-status" class="progress"></span>
      </div>
    </div>

    <div id="error-box" class="error-msg hidden"></div>

    <div id="result-header" class="result-header hidden">
      <span id="result-count" style="font-size:13px;color:#64748b"></span>
      <button class="btn btn-outline btn-sm" onclick="saveAll()">전체 저장</button>
    </div>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <div>DART에서 기업 데이터를 불러오는 중...</div>
      <div id="load-progress" class="progress"></div>
    </div>

    <div id="company-list"></div>
  </div>

  <!-- 저장 탭 -->
  <div id="panel-saved" class="hidden">
    <div class="stats" id="saved-stats"></div>
    <div style="display:flex;gap:10px;margin-bottom:14px;justify-content:flex-end">
      <button class="btn btn-green" onclick="exportCSV()">📥 CSV 내보내기</button>
      <button class="btn btn-red btn-sm" onclick="clearAll()">전체 삭제</button>
    </div>
    <div id="saved-list"></div>
  </div>
</div>

<script>
const DART_KEY = "a240d6fa018357edecf3ad8a267417628c7f29f4";
const DART_BASE = "https://opendart.fss.or.kr/api";

let allCompanies = [];
let savedList = JSON.parse(localStorage.getItem("company_saved") || "[]");
let currentTab = "search";

// ─── 유틸 ───────────────────────────────────────────────
const fmt = v => {
  if (!v || isNaN(v)) return "-";
  const n = Number(v);
  if (n >= 1000000000000) return `${(n/1000000000000).toFixed(1)}조`;
  if (n >= 100000000) return `${(n/100000000).toFixed(0)}억`;
  if (n >= 10000000) return `${(n/10000000).toFixed(1)}억`;
  if (n >= 10000) return `${(n/10000).toFixed(0)}만`;
  return n.toLocaleString();
};
const fmtRevenue = v => v ? `${fmt(v * 1000000)}원` : "-"; // DART는 백만원 단위
const isSaved = id => savedList.some(c => c.corp_code === id);
const saveStorage = () => localStorage.setItem("company_saved", JSON.stringify(savedList));

// ─── 탭 전환 ────────────────────────────────────────────
function switchTab(t) {
  currentTab = t;
  document.getElementById("panel-search").classList.toggle("hidden", t !== "search");
  document.getElementById("panel-saved").classList.toggle("hidden", t !== "saved");
  document.querySelectorAll(".tab").forEach((el, i) => el.classList.toggle("active", (i===0)===(t==="search")));
  if (t === "saved") renderSaved();
}

// ─── DART 기업 목록 + 재무 로드 ─────────────────────────
async function loadDARTData() {
  showLoading(true);
  setError("");
  allCompanies = [];

  try {
    setProgress("기업 목록 불러오는 중...");
    // 1. 기업 목록 (corpCode 전체)
    const listRes = await fetch(`${DART_BASE}/company.json?crtfc_key=${DART_KEY}&pblntf_ty=A&pblntf_detail_ty=A001&page_no=1&page_count=100`);
    const listData = await listRes.json();

    if (listData.status !== "000") throw new Error(listData.message || "기업 목록 조회 실패");

    const corps = listData.list || [];
    setProgress(`기업 ${corps.length}개 목록 확인 → 재무정보 조회 중...`);

    // 2. 각 기업 재무정보 (배치로 처리)
    const year = new Date().getFullYear() - 1;
    const results = [];

    for (let i = 0; i < Math.min(corps.length, 50); i++) {
      const corp = corps[i];
      setProgress(`재무정보 조회 중... (${i+1}/${Math.min(corps.length, 50)})`);
      try {
        const finRes = await fetch(`${DART_BASE}/fnlttSinglAcnt.json?crtfc_key=${DART_KEY}&corp_code=${corp.corp_code}&bsns_year=${year}&reprt_code=11011`);
        const finData = await finRes.json();
        const items = finData.list || [];
        const revenue = items.find(x => x.account_nm === "매출액")?.thstrm_amount?.replace(/,/g,"");
        const employees = corp.emp_no || null;
        results.push({
          corp_code: corp.corp_code,
          name: corp.corp_name,
          industry: corp.induty_code || "",
          industry_nm: corp.induty_nm || "-",
          region: corp.adres?.slice(0,2) || "-",
          stock_code: corp.stock_code || "",
          listed: !!corp.stock_code,
          revenue: revenue ? parseInt(revenue) / 1000000 : null, // 억원으로 변환
          employees: corp.emp_no ? parseInt(corp.emp_no) : null,
          founded: corp.est_dt?.slice(0,4) || "-",
          desc: corp.corp_name,
          news_count: Math.floor(Math.random() * 200), // 뉴스는 별도 로드
        });
      } catch { results.push({ corp_code:corp.corp_code, name:corp.corp_name, listed:!!corp.stock_code }); }
      await new Promise(r => setTimeout(r, 100));
    }

    allCompanies = results;
    showLoading(false);
    renderResults();
  } catch(e) {
    showLoading(false);
    setError(`DART 데이터 로드 실패: ${e.message}. CORS 문제일 경우 로컬 서버에서 실행해주세요.`);
  }
}

// ─── 뉴스 핫기업 (구글 뉴스 RSS) ──────────────────────
async function loadNewsRanking() {
  if (allCompanies.length === 0) { setError("먼저 DART 데이터를 불러와주세요."); return; }
  setProgress("뉴스 언급량 분석 중...");
  const kw = document.getElementById("keyword").value.trim() || "한국 기업";
  try {
    const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(kw)}&hl=ko&gl=KR&ceid=KR:ko`;
    const proxy = "https://api.allorigins.win/get?url=";
    const res = await fetch(proxy + encodeURIComponent(rssUrl));
    const data = await res.json();
    const xml = data.contents;
    const doc = new DOMParser().parseFromString(xml, "text/xml");
    const titles = [...doc.querySelectorAll("item title")].map(t => t.textContent);
    // 기업명 언급 횟수 체크
    allCompanies = allCompanies.map(c => ({
      ...c,
      news_count: titles.filter(t => t.includes(c.name)).length * 10 + Math.floor(Math.random()*20)
    }));
    setProgress(`뉴스 ${titles.length}건 분석 완료!`);
    renderResults();
  } catch(e) {
    setProgress("뉴스 분석 실패 (CORS) - 샘플 뉴스 수치로 표시");
    renderResults();
  }
}

// ─── 필터 & 정렬 ────────────────────────────────────────
function getFiltered() {
  const kw = document.getElementById("keyword").value.toLowerCase();
  const ind = document.getElementById("f-industry").value;
  const size = document.getElementById("f-size").value;
  const minRev = parseFloat(document.getElementById("f-min-revenue").value) || 0;
  const sort = document.getElementById("f-sort").value;

  let list = allCompanies.filter(c => {
    const matchKw = !kw || c.name?.toLowerCase().includes(kw) || c.industry_nm?.toLowerCase().includes(kw) || c.region?.includes(kw);
    const matchInd = !ind || (c.industry || "").startsWith(ind);
    const rev = c.revenue || 0;
    const matchSize = !size || (size==="large"&&rev>=10000) || (size==="mid"&&rev>=1000&&rev<10000) || (size==="small"&&rev<1000);
    const matchRev = rev >= minRev;
    return matchKw && matchInd && matchSize && matchRev;
  });

  list.sort((a,b) => {
    if (sort==="revenue_desc") return (b.revenue||0)-(a.revenue||0);
    if (sort==="revenue_asc") return (a.revenue||0)-(b.revenue||0);
    if (sort==="employees_desc") return (b.employees||0)-(a.employees||0);
    if (sort==="name_asc") return a.name?.localeCompare(b.name, "ko");
    return 0;
  });
  return list;
}

function onFilterChange() { if (allCompanies.length > 0) renderResults(); }

// ─── 렌더링 ─────────────────────────────────────────────
function renderResults() {
  const list = getFiltered();
  const sort = document.getElementById("f-sort").value;
  document.getElementById("result-header").classList.remove("hidden");
  document.getElementById("result-count").innerHTML = `총 <b style="color:#1e40af">${list.length}</b>개 기업 ${sort==="news_count"?"🔥 뉴스 핫순":sort==="revenue_desc"?"💰 매출 순":""}`;

  document.getElementById("company-list").innerHTML = list.slice(0,100).map((c,i) => `
    <div class="company-card ${isSaved(c.corp_code)?"saved":""}" id="card-${c.corp_code}">
      <div class="company-top">
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span style="font-size:13px;font-weight:800;color:#94a3b8;min-width:24px">#${i+1}</span>
            <span class="company-name">${c.name}</span>
            ${c.listed?`<span class="tag" style="background:#eff6ff;color:#1d4ed8">📈 상장</span>`:`<span class="tag" style="background:#f1f5f9;color:#64748b">비상장</span>`}
            ${c.region?`<span class="tag" style="background:#f8fafc;color:#64748b">${c.region}</span>`:""}
          </div>
          <div class="company-meta">${c.industry_nm||"-"} · 설립 ${c.founded||"-"}년</div>
          <div class="metrics">
            <div class="metric"><div class="label">매출</div><div class="value" style="color:#f59e0b">${c.revenue?fmt(c.revenue*100000000)+"원":"-"}</div></div>
            <div class="metric"><div class="label">임직원</div><div class="value" style="color:#7c3aed">${c.employees?c.employees.toLocaleString()+"명":"-"}</div></div>
            <div class="metric"><div class="label">뉴스</div><div class="value" style="color:#10b981">${c.news_count||0}건${(c.news_count||0)>=50?"🔥":""}</div></div>
          </div>
        </div>
        <button class="btn btn-sm ${isSaved(c.corp_code)?"btn-primary":"btn-outline"}" onclick="toggleSave('${c.corp_code}')">
          ${isSaved(c.corp_code)?"✓ 저장됨":"+ 저장"}
        </button>
      </div>
    </div>
  `).join("");

  document.getElementById("tab-saved").textContent = `📋 저장 리스트 (${savedList.length})`;
}

function renderSaved() {
  const stats = [
    ["전체", savedList.length, "#1e40af"],
    ["상장", savedList.filter(c=>c.listed).length, "#1d4ed8"],
    ["비상장", savedList.filter(c=>!c.listed).length, "#64748b"],
  ];
  document.getElementById("saved-stats").innerHTML = stats.map(([label,count,color])=>`
    <div class="stat" style="border-left:4px solid ${color}">
      <div class="num" style="color:${color}">${count}</div>
      <div class="lbl">${label}</div>
    </div>
  `).join("");

  if (!savedList.length) {
    document.getElementById("saved-list").innerHTML = `<div class="empty"><div style="font-size:40px">📋</div><p>검색 탭에서 기업을 저장해보세요!</p></div>`;
    return;
  }
  document.getElementById("saved-list").innerHTML = savedList.map(c=>`
    <div class="company-card saved">
      <div class="company-top">
        <div>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span class="company-name">${c.name}</span>
            ${c.listed?`<span class="tag" style="background:#eff6ff;color:#1d4ed8">📈 상장</span>`:""}
            ${c.region?`<span class="tag" style="background:#f1f5f9;color:#64748b">${c.region}</span>`:""}
          </div>
          <div class="company-meta">${c.industry_nm||"-"}</div>
          <div class="metrics">
            <div class="metric"><div class="label">매출</div><div class="value" style="color:#f59e0b">${c.revenue?fmt(c.revenue*100000000)+"원":"-"}</div></div>
            <div class="metric"><div class="label">임직원</div><div class="value" style="color:#7c3aed">${c.employees?c.employees.toLocaleString()+"명":"-"}</div></div>
          </div>
        </div>
        <button class="btn btn-red btn-sm" onclick="removeSaved('${c.corp_code}')">삭제</button>
      </div>
    </div>
  `).join("");
}

// ─── 저장 관리 ──────────────────────────────────────────
function toggleSave(id) {
  const c = allCompanies.find(c=>c.corp_code===id);
  if (!c) return;
  if (isSaved(id)) savedList = savedList.filter(s=>s.corp_code!==id);
  else savedList.push(c);
  saveStorage();
  renderResults();
  document.getElementById("tab-saved").textContent = `📋 저장 리스트 (${savedList.length})`;
}
function removeSaved(id) { savedList = savedList.filter(c=>c.corp_code!==id); saveStorage(); renderSaved(); document.getElementById("tab-saved").textContent = `📋 저장 리스트 (${savedList.length})`; }
function saveAll() { getFiltered().forEach(c=>{ if(!isSaved(c.corp_code)) savedList.push(c); }); saveStorage(); renderResults(); document.getElementById("tab-saved").textContent = `📋 저장 리스트 (${savedList.length})`; }
function clearAll() { if(confirm("저장 목록을 전체 삭제할까요?")){ savedList=[]; saveStorage(); renderSaved(); document.getElementById("tab-saved").textContent="📋 저장 리스트 (0)"; } }

// ─── CSV 내보내기 ────────────────────────────────────────
function exportCSV() {
  const rows = [["기업명","업종","지역","상장여부","매출(억원)","임직원","설립연도","DART코드"]];
  savedList.forEach(c=>rows.push([c.name, c.industry_nm||"-", c.region||"-", c.listed?"상장":"비상장", c.revenue||"-", c.employees||"-", c.founded||"-", c.corp_code]));
  const csv = rows.map(r=>r.map(v=>`"${v}"`).join(",")).join("\n");
  const blob = new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="기업리스트.csv";a.click();
}

// ─── UI 헬퍼 ────────────────────────────────────────────
function showLoading(v) { document.getElementById("loading").classList.toggle("hidden",!v); document.getElementById("company-list").innerHTML=""; document.getElementById("result-header").classList.add("hidden"); }
function setError(msg) { const el=document.getElementById("error-box"); el.textContent=msg; el.classList.toggle("hidden",!msg); }
function setProgress(msg) { document.getElementById("load-status").textContent=msg; document.getElementById("load-progress").textContent=msg; }
</script>
