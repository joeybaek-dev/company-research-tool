<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>기업 리서치 툴</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Apple SD Gothic Neo",Pretendard,sans-serif;background:#f1f5f9;min-height:100vh;padding:20px}
.wrap{max-width:1000px;margin:0 auto}
.header{background:linear-gradient(135deg,#0f172a,#1e40af);border-radius:16px;padding:20px 26px;margin-bottom:16px;color:#fff}
.header h1{font-size:20px;font-weight:800}
.header p{margin-top:5px;opacity:.8;font-size:13px}
.tabs{display:flex;gap:8px;margin-bottom:16px}
.tab{padding:9px 20px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:13px;background:#fff;color:#64748b;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.tab.active{background:#1e40af;color:#fff}
.card{background:#fff;border-radius:14px;padding:20px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
input,select{padding:8px 12px;border-radius:8px;border:1.5px solid #e2e8f0;font-size:13px;font-family:inherit}
input:focus,select:focus{outline:none;border-color:#1e40af}
.search-input{width:100%;padding:11px 14px;border-radius:10px;font-size:14px;margin-bottom:14px}
.filter-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.fi{flex:1;min-width:130px}
.fi label{font-size:11px;color:#94a3b8;display:block;margin-bottom:3px}
.fi select,.fi input{width:100%}
.btn{padding:9px 18px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:13px}
.btn-primary{background:#1e40af;color:#fff}
.btn-outline{background:#fff;color:#1e40af;border:1.5px solid #1e40af}
.btn-green{background:#10b981;color:#fff}
.btn-red{background:#fff;color:#ef4444;border:1.5px solid #fca5a5}
.btn-gray{background:#f1f5f9;color:#64748b;border:1.5px solid #e2e8f0}
.btn-sm{padding:6px 12px;font-size:12px}
.co-card{background:#fff;border-radius:12px;padding:16px 18px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:2px solid transparent}
.co-card.checked{border-color:#1e40af;background:#fafbff}
.co-card.saved-co{border-color:#10b981}
.tag{font-size:11px;padding:2px 8px;border-radius:20px;display:inline-block}
.metrics{display:flex;gap:14px;margin-top:8px;flex-wrap:wrap}
.metric .lbl{font-size:10px;color:#94a3b8}
.metric .val{font-size:14px;font-weight:800}
.stats{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.stat{flex:1;min-width:90px;background:#fff;border-radius:10px;padding:10px 14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.stat .num{font-size:20px;font-weight:800}
.stat .lbl{font-size:12px;color:#64748b}
.empty{text-align:center;padding:60px;color:#94a3b8}
.bulk-bar{display:flex;gap:8px;align-items:center;padding:10px 14px;background:#eff6ff;border-radius:10px;margin-bottom:10px;flex-wrap:wrap}
input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:#1e40af}
.pagination{display:flex;gap:6px;align-items:center;justify-content:center;margin-top:16px;flex-wrap:wrap}
.pg-btn{padding:6px 12px;border-radius:8px;border:1.5px solid #e2e8f0;background:#fff;color:#64748b;font-size:13px;cursor:pointer;font-weight:600}
.pg-btn.active{background:#1e40af;color:#fff;border-color:#1e40af}
.pg-btn:disabled{opacity:.4;cursor:default}
.detail-box{margin-top:12px;font-size:12px}
.detail-info{padding:12px 14px;background:#f8fafc;border-radius:10px;margin-bottom:8px}
.news-box{padding:12px 14px;background:#fff7ed;border-radius:10px;border:1px solid #fed7aa}
.news-title{font-weight:700;color:#c2410c;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.news-item{display:flex;gap:8px;align-items:flex-start}
.news-item+.news-item{margin-top:8px;padding-top:8px;border-top:1px solid #fed7aa}

</head>

            <option value="건설/부동산">건설/부동산</option>
            <option value="미디어/콘텐츠">미디어/콘텐츠</option>
          </select>
        </div>
        <div class="fi">
          <label>임직원 수</label>
          <select id="f-emp" onchange="applyFilter()">
            <option value="">전체</option>
            <option value="0-100">100명 이하</option>
            <option value="100-500">100~500명</option>
            <option value="500-1000">500~1000명</option>
            <option value="1000-5000">1000~5000명</option>
            <option value="5000-">5000명 이상</option>
          </select>
        </div>
        <div class="fi">
          <label>상장 여부</label>
          <select id="f-listed" onchange="applyFilter()">
            <option value="">전체</option>
            <option value="Y">상장사</option>
            <option value="N">비상장사</option>
          </select>
        </div>
        <div class="fi">
          <label>정렬</label>
          <select id="f-sort" onchange="applyFilter()">
            <option value="revenue_desc">매출액 높은 순</option>
            <option value="revenue_asc">매출액 낮은 순</option>
            <option value="employees_desc">임직원 많은 순</option>
            <option value="employees_asc">임직원 적은 순</option>
            <option value="name_asc">기업명 가나다순</option>
          </select>
        </div>
      </div>
    </div>

    <div id="bulk-bar" class="bulk-bar" style="display:none">
      <input type="checkbox" id="chk-all" onchange="togglePageSelect(this.checked)"/>
      <span style="font-size:13px;color:#1e40af;font-weight:600">현재 페이지 전체선택</span>
      <span id="chk-count" style="font-size:12px;color:#64748b"></span>
      <div style="margin-left:auto;display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-outline btn-sm" onclick="selectAllPages()">전체 페이지 선택</button>
        <button class="btn btn-primary btn-sm" onclick="saveChecked()">✚ 선택 저장</button>
      </div>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px">
      <span id="result-count" style="font-size:13px;color:#64748b"></span>
    </div>

    <div id="co-list"></div>
    <div id="pagination" class="pagination"></div>
  </div>

  <!-- 저장 탭 -->

    <div class="stats" id="saved-stats"></div>
    <div style="display:flex;gap:8px;margin-bottom:14px;justify-content:flex-end;flex-wrap:wrap">
      <button class="btn btn-green btn-sm" onclick="exportCSV()">📥 CSV 내보내기</button>
      <button class="btn btn-red btn-sm" onclick="clearAll()">전체 삭제</button>
    </div>
    <div id="saved-list"></div>
  </div>
</div>

// ─── 상태 ────────────────────────────────────────────────
const PAGE_SIZE = 10;
let filtered = [...DATA];
let currentPage = 1;
let checkedIds = new Set();
let allSelected = false;
let savedList = JSON.parse(localStorage.getItem("co_saved2") || "[]");
const newsCache = {};
const detailOpen = new Set();

// ─── 필터 & 정렬 ──────────────────────────────────────────
function applyFilter() {
  const kw = document.getElementById("kw").value.toLowerCase();
  const ind = document.getElementById("f-ind").value;
  const emp = document.getElementById("f-emp").value;
  const listed = document.getElementById("f-listed").value;
  const sort = document.getElementById("f-sort").value;

  filtered = DATA.filter(c => {
    const [eMin, eMax] = emp ? emp.split("-").map(Number) : [0, Infinity];
    return (
      (!kw || c.name.toLowerCase().includes(kw) || c.ind.includes(kw) || c.desc.includes(kw)) &&
      (!ind || c.ind === ind) &&
      (!emp || (c.employees >= eMin && (isNaN(eMax) || c.employees < eMax))) &&
      (!listed || (listed==="Y" ? c.listed : !c.listed))
    );
  }).sort((a,b) => {
    if (sort==="revenue_desc") return b.revenue - a.revenue;
    if (sort==="revenue_asc") return a.revenue - b.revenue;
    if (sort==="employees_desc") return b.employees - a.employees;
    if (sort==="employees_asc") return a.employees - b.employees;
    return a.name.localeCompare(b.name,"ko");
  });

  currentPage = 1;
  checkedIds.clear();
  allSelected = false;
  render();
}

function render() {

  document.getElementById("result-count").innerHTML =
    `총 <b style="color:#1e40af">${total}</b>개 기업`;
  document.getElementById("bulk-bar").style.display = total ? "flex" : "none";
  updateBulkBar();

  if (page.length === 0) {
    document.getElementById("co-list").innerHTML = `<div class="empty"><div style="font-size:36px">🔍</div><p style="margin-top:8px">조건에 맞는 기업이 없어요</p></div>`;
    document.getElementById("pagination").innerHTML = "";
    return;
  }

  document.getElementById("result-count").innerHTML = `총 <b style="color:#1e40af">${total}</b>개 기업`;
  document.getElementById("bulk-bar").style.display = total ? "flex" : "none";
  updateBulkBar();

  if (!page.length) {
    document.getElementById("co-list").innerHTML = `<div class="empty"><div style="font-size:36px">🔍</div><p style="margin-top:8px">조건에 맞는 기업이 없어요</p></div>`;
    document.getElementById("pagination").innerHTML = "";
    return;
  }

  document.getElementById("co-list").innerHTML = page.map((c) => {

    const isOpen = detailOpen.has(c.id);

    <div class="co-card ${isChecked?"checked":""} ${isSaved?"saved-co":""}" id="card-${c.id}">
      <div style="display:flex;align-items:flex-start;gap:10px">
        <div style="padding-top:2px;flex-shrink:0">
          <input type="checkbox" ${isChecked?"checked":""} onchange="toggleCheck('${c.id}',this.checked)"/>
        </div>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span style="font-weight:800;font-size:15px;color:#0f172a">${c.name}</span>
            ${c.listed?`<span class="tag" style="background:#eff6ff;color:#1d4ed8">📈 상장</span>`:`<span class="tag" style="background:#f1f5f9;color:#64748b">비상장</span>`}
            <span class="tag" style="background:#f1f5f9;color:#64748b">${c.region}</span>
            <span class="tag" style="background:#e0e7ff;color:#3730a3">${c.ind}</span>
            ${isSaved?`<span class="tag" style="background:#dcfce7;color:#15803d">✓ 저장됨</span>`:""}
          </div>
          <div style="font-size:12px;color:#64748b;margin-top:3px">${c.desc} · 설립 ${c.founded}년</div>
          <div class="metrics">
            <div class="metric"><div class="lbl">매출</div><div class="val" style="color:#f59e0b">${fmt(c.revenue)}</div></div>
            <div class="metric"><div class="lbl">임직원</div><div class="val" style="color:#0ea5e9">${c.employees.toLocaleString()}명</div></div>
          </div>
        </div>
        <button class="btn btn-gray btn-sm" onclick="toggleDetail('${c.id}')" id="btn-d-${c.id}">${isOpen?"▲ 닫기":"▼ 상세"}</button>
      </div>
      <div id="detail-${c.id}" style="display:${isOpen?"block":"none"}">
        <div class="detail-box">
          <div class="detail-info">
            <div style="display:flex;gap:16px;flex-wrap:wrap;color:#1e293b">
              <span><span style="color:#94a3b8">업종: </span>${c.ind}</span>
              <span><span style="color:#94a3b8">지역: </span>${c.region}</span>
              <span><span style="color:#94a3b8">설립: </span>${c.founded}년</span>
              <span><span style="color:#94a3b8">임직원: </span><b style="color:#0ea5e9">${c.employees.toLocaleString()}명</b></span>
              <span><span style="color:#94a3b8">매출: </span><b style="color:#f59e0b">${fmt(c.revenue)}</b></span>
              <span><span style="color:#94a3b8">상장: </span>${c.listed?"상장":"비상장"}</span>
            </div>
          </div>
          <div class="news-box" id="news-${c.id}">
            <div class="news-title">📰 최근 뉴스</div>
            <div id="news-list-${c.id}" style="color:#94a3b8;font-size:12px">불러오는 중...</div>
          </div>
        </div>
      </div>
    </div>`;
  }).join("") || `<div class="empty"><div style="font-size:36px">🔍</div><p style="margin-top:8px">조건에 맞는 기업이 없어요</p></div>`;

  // 뉴스 로드 (열린 것만)
  page.filter(c => detailOpen.has(c.id)).forEach(c => loadNews(c));

  // 페이지네이션
  renderPagination(totalPages);
}

function renderPagination(total) {
  const pEl = document.getElementById("pagination");
  if (total <= 1) { pEl.innerHTML=""; return; }
  const p = currentPage;
  let html = `<button class="pg-btn" onclick="goPage(${p-1})" ${p<=1?"disabled":""}>‹</button>`;
  const s = Math.max(1,p-2), e = Math.min(total,p+2);
  if (s>1) html+=`<button class="pg-btn" onclick="goPage(1)">1</button>${s>2?`<span style="color:#94a3b8">…</span>`:""}`;
  for(let i=s;i<=e;i++) html+=`<button class="pg-btn ${i===p?"active":""}" onclick="goPage(${i})">${i}</button>`;
  if(e<total) html+=`${e<total-1?`<span style="color:#94a3b8">…</span>`:""}<button class="pg-btn" onclick="goPage(${total})">${total}</button>`;
  html+=`<button class="pg-btn" onclick="goPage(${p+1})" ${p>=total?"disabled":""}>›</button>`;
  pEl.innerHTML = html;
}

function goPage(p) { currentPage=p; checkedIds.clear(); render(); window.scrollTo({top:0,behavior:"smooth"}); }

// ─── 상세 & 뉴스 ─────────────────────────────────────────
function toggleDetail(id) {
  const el = document.getElementById(`detail-${id}`);
  const btn = document.getElementById(`btn-d-${id}`);
  const isOpen = el.style.display !== "none";
  el.style.display = isOpen ? "none" : "block";
  btn.textContent = isOpen ? "▼ 상세" : "▲ 닫기";
  if (isOpen) detailOpen.delete(id);
  else {
    detailOpen.add(id);
    const c = DATA.find(x => x.id === id);
    if (c) loadNews(c);
  }
}

async function loadNews(c) {
  const listEl = document.getElementById(`news-list-${c.id}`);
  if (!listEl) return;
  if (newsCache[c.id]) { renderNews(c.id, newsCache[c.id]); return; }
  try {
    const rss = `https://news.google.com/rss/search?q=${encodeURIComponent(c.name)}&hl=ko&gl=KR&ceid=KR:ko`;
    // 여러 프록시 순차 시도
    const proxies = [
      `https://api.allorigins.win/get?url=${encodeURIComponent(rss)}`,
      `https://corsproxy.io/?${encodeURIComponent(rss)}`,
    ];
    let xml = null;
    for (const proxy of proxies) {
      try {
        const res = await fetch(proxy, { signal: AbortSignal.timeout(5000) });
        if (!res.ok) continue;
        const isAllOrigins = proxy.includes("allorigins");
        if (isAllOrigins) {
          const data = await res.json();
          xml = data.contents;
        } else {
          xml = await res.text();
        }
        if (xml && xml.includes("<item>")) break;
      } catch { continue; }
    }
    if (!xml) throw new Error("프록시 모두 실패");
    const doc = new DOMParser().parseFromString(xml, "text/xml");
    const items = [...doc.querySelectorAll("item")].slice(0,3).map(item => ({
      title: item.querySelector("title")?.textContent || "",
      source: item.querySelector("source")?.textContent || "",
      date: item.querySelector("pubDate")?.textContent || "",
    }));
    newsCache[c.id] = items;
    renderNews(c.id, items);
  } catch {
    if (listEl) listEl.textContent = "뉴스를 불러올 수 없어요";
  }
}

function renderNews(id, items) {
  const listEl = document.getElementById(`news-list-${id}`);
  if (!listEl) return;
  if (!items.length) { listEl.textContent = "최근 뉴스가 없어요"; return; }
  listEl.innerHTML = items.map((n,i) => `
    <div class="news-item" ${i===0?"":"style=''"}>
      <span style="color:#fb923c;flex-shrink:0;margin-top:1px">▸</span>
      <div>
        <div style="color:#1e293b;font-weight:500;line-height:1.5;font-size:12px">${n.title}</div>
        <div style="color:#94a3b8;font-size:11px;margin-top:2px">${n.source}${n.source&&n.date?" · ":""}${n.date?new Date(n.date).toLocaleDateString("ko-KR"):""}</div>
      </div>
    </div>`).join("");
}

// ─── 체크박스 ─────────────────────────────────────────────
function toggleCheck(id, checked) {
  allSelected = false;
  checked ? checkedIds.add(id) : checkedIds.delete(id);
  const card = document.getElementById(`card-${id}`);
  if (card) {
    const isSaved = savedList.some(s=>s.id===id);
    card.className = `co-card ${checked?"checked":""} ${isSaved?"saved-co":""}`;
  }
  updateBulkBar();
}

function togglePageSelect(checked) {
  allSelected = false;
  const start = (currentPage-1)*PAGE_SIZE;
  filtered.slice(start, start+PAGE_SIZE).forEach(c => checked ? checkedIds.add(c.id) : checkedIds.delete(c.id));
  render();
}

function selectAllPages() {
  allSelected = true;
  filtered.forEach(c => checkedIds.add(c.id));
  render();
}

function updateBulkBar() {
  const count = allSelected ? filtered.length : checkedIds.size;
  document.getElementById("chk-count").textContent = count>0 ? `${count}개 선택됨` : "";
  const start = (currentPage-1)*PAGE_SIZE;
  const page = filtered.slice(start, start+PAGE_SIZE);
  document.getElementById("chk-all").checked = page.length>0 && page.every(c=>checkedIds.has(c.id));
}

function saveChecked() {
  const toSave = allSelected ? filtered : filtered.filter(c=>checkedIds.has(c.id));
  let added = 0;
  toSave.forEach(c => { if(!savedList.some(s=>s.id===c.id)){ savedList.push(c); added++; } });
  saveStore();
  render();
  alert(`✅ ${added}개 저장 완료 (전체 ${savedList.length}개)`);
}

// ─── 저장 관리 ────────────────────────────────────────────
const saveStore = () => { localStorage.setItem("co_saved2", JSON.stringify(savedList)); document.getElementById("tab-saved").textContent=`📋 저장 리스트 (${savedList.length})`; };

function renderSaved() {
  document.getElementById("saved-stats").innerHTML = [
    ["전체",savedList.length,"#1e40af"],
    ["상장",savedList.filter(c=>c.listed).length,"#1d4ed8"],
    ["비상장",savedList.filter(c=>!c.listed).length,"#64748b"],
  ].map(([l,n,c])=>`<div class="stat" style="border-left:4px solid ${c}"><div class="num" style="color:${c}">${n}</div><div class="lbl">${l}</div></div>`).join("");

  if (!savedList.length) {
    document.getElementById("saved-list").innerHTML=`<div class="empty"><div style="font-size:36px">📋</div><p style="margin-top:8px">검색 탭에서 기업을 저장해보세요!</p></div>`;
    return;
  }
  document.getElementById("saved-list").innerHTML = savedList.map(c=>`
    <div class="co-card saved-co">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
        <div>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span style="font-weight:800;font-size:15px;color:#0f172a">${c.name}</span>
            ${c.listed?`<span class="tag" style="background:#eff6ff;color:#1d4ed8">📈 상장</span>`:""}
            <span class="tag" style="background:#e0e7ff;color:#3730a3">${c.ind}</span>
          </div>
          <div class="metrics">
            <div class="metric"><div class="lbl">매출</div><div class="val" style="color:#f59e0b">${fmt(c.revenue)}</div></div>
            <div class="metric"><div class="lbl">임직원</div><div class="val" style="color:#0ea5e9">${c.employees.toLocaleString()}명</div></div>
          </div>
        </div>
        <button class="btn btn-red btn-sm" onclick="removeSaved('${c.id}')">삭제</button>
      </div>
    </div>`).join("");
}

function removeSaved(id) { savedList=savedList.filter(c=>c.id!==id); saveStore(); renderSaved(); }
function clearAll() { if(confirm("전체 삭제할까요?")){ savedList=[]; saveStore(); renderSaved(); } }

function exportCSV() {
  const rows=[["기업명","업종","지역","상장","매출(백만)","임직원","설립연도"]];
  savedList.forEach(c=>rows.push([c.name,c.ind,c.region,c.listed?"상장":"비상장",c.revenue,c.employees,c.founded]));
  const csv=rows.map(r=>r.map(v=>`"${v}"`).join(",")).join("\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="기업리스트.csv";a.click();
}

// ─── 탭 ──────────────────────────────────────────────────
function switchTab(t) {
  document.getElementById("panel-search").style.display = t==="search"?"block":"none";
  document.getElementById("panel-saved").style.display = t==="saved"?"block":"none";
  document.querySelectorAll(".tab").forEach((el,i)=>el.classList.toggle("active",(i===0)===(t==="search")));
  if(t==="saved") renderSaved();
}

// ─── 유틸 ────────────────────────────────────────────────
// 매출 단위: 백만원
const fmt = v => {
  if(!v) return "-";
  const억 = v / 100;        // 백만원 → 억원
  if(억 >= 10000) return `${(억/10000).toFixed(1)}조`;
  if(억 >= 1000) return `${(억/1000).toFixed(0)}천억`;
  if(억 >= 100) return `${Math.round(억/100)*100}억`.replace("00억","00억");
  if(억 >= 1) return `${억.toFixed(0)}억`;
  return `${v}백만`;
};
