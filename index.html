<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>기업 리서치 툴</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Apple SD Gothic Neo",sans-serif;background:#f1f5f9;min-height:100vh;padding:20px}
.wrap{max-width:1000px;margin:0 auto}
.header{background:linear-gradient(135deg,#0f172a,#1e40af);border-radius:16px;padding:20px 26px;margin-bottom:16px;color:#fff}
.header h1{font-size:20px;font-weight:800}
.header p{margin-top:5px;opacity:.8;font-size:13px}
.tabs{display:flex;gap:8px;margin-bottom:16px}
.tab{padding:9px 20px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:13px;background:#fff;color:#64748b;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.tab.active{background:#1e40af;color:#fff}
.card{background:#fff;border-radius:14px;padding:20px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
input,select{padding:8px 12px;border-radius:8px;border:1.5px solid #e2e8f0;font-size:13px;font-family:inherit}
.si{width:100%;padding:11px 14px;border-radius:10px;font-size:14px;margin-bottom:14px}
.fr{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.fi{flex:1;min-width:130px}
.fi label{font-size:11px;color:#94a3b8;display:block;margin-bottom:3px}
.fi select{width:100%}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:13px}
.bp{background:#1e40af;color:#fff}
.bg{background:#f1f5f9;color:#64748b;border:1.5px solid #e2e8f0}
.bo{background:#fff;color:#1e40af;border:1.5px solid #1e40af}
.bge{background:#10b981;color:#fff}
.bre{background:#fff;color:#ef4444;border:1.5px solid #fca5a5}
.bs{padding:6px 12px;font-size:12px}
.co{background:#fff;border-radius:12px;padding:16px 18px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:2px solid transparent}
.co.ck{border-color:#1e40af;background:#fafbff}
.co.sv{border-color:#10b981}
.tag{font-size:11px;padding:2px 8px;border-radius:20px;display:inline-block}
.mt{display:flex;gap:14px;margin-top:8px;flex-wrap:wrap}
.mt .l{font-size:10px;color:#94a3b8}
.mt .v{font-size:14px;font-weight:800}
.bb{display:flex;gap:8px;align-items:center;padding:10px 14px;background:#eff6ff;border-radius:10px;margin-bottom:10px;flex-wrap:wrap}
input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:#1e40af}
.pg{display:flex;gap:6px;align-items:center;justify-content:center;margin-top:16px;flex-wrap:wrap}
.pb{padding:6px 12px;border-radius:8px;border:1.5px solid #e2e8f0;background:#fff;color:#64748b;font-size:13px;cursor:pointer;font-weight:600}
.pb.ac{background:#1e40af;color:#fff;border-color:#1e40af}
.pb:disabled{opacity:.4;cursor:default}
.empty{text-align:center;padding:60px;color:#94a3b8}
.loading{text-align:center;padding:40px;color:#64748b}
.spinner{width:32px;height:32px;border:4px solid #e0e7ff;border-top-color:#1e40af;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.di{padding:12px 14px;background:#f8fafc;border-radius:10px;margin-top:10px;font-size:12px}
.nb{padding:12px 14px;background:#fff7ed;border-radius:10px;border:1px solid #fed7aa;margin-top:8px}
.nt{font-weight:700;color:#c2410c;margin-bottom:8px;font-size:12px}
.ni{display:flex;gap:8px;align-items:flex-start;font-size:12px}
.ni+.ni{margin-top:8px;padding-top:8px;border-top:1px solid #fed7aa}
.st{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.sc{flex:1;min-width:90px;background:#fff;border-radius:10px;padding:10px 14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.sc .n{font-size:20px;font-weight:800}
.sc .l{font-size:12px;color:#64748b}
.init-loading{text-align:center;padding:80px;color:#64748b}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>🏢 기업 리서치 & 리스트업 툴</h1>
    <p id="header-sub">기업 목록 불러오는 중...</p>
  </div>

  <div class="tabs">
    <button class="tab active" id="t1" onclick="switchTab('search')">🔍 기업 검색</button>
    <button class="tab" id="t2" onclick="switchTab('saved')">📋 저장 리스트 (0)</button>
  </div>

  <div id="ps">
    <div class="card">
      <input type="text" class="si" id="kw" placeholder="🔍 기업명 검색 (비워두면 필터 조건으로만 검색)"/>
      <div class="fr">
        <div class="fi"><label>업종 (상장사만)</label>
          <select id="find">
            <option value="">전체</option>
          </select>
        </div>
        <div class="fi"><label>상장 여부</label>
          <select id="fl">
            <option value="">전체</option>
            <option value="Y">상장사</option>
            <option value="N">비상장사</option>
          </select>
        </div>
        <div class="fi"><label>정렬 (재무정보 조회 후 적용)</label>
          <select id="fs">
            <option value="revenue_desc">매출액 높은 순</option>
            <option value="revenue_asc">매출액 낮은 순</option>
            <option value="employees_desc">임직원 많은 순</option>
            <option value="name_asc">기업명 가나다순</option>
          </select>
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <button class="btn bp" id="btn-search" onclick="doSearch()">🔍 검색하기</button>
        <button class="btn bg bs" id="btn-stop" style="display:none" onclick="stopSearch()">⏹ 중단</button>
        <span id="search-status" style="font-size:12px;color:#64748b"></span>
      </div>
    </div>

    <!-- 초기 로딩 -->
    <div id="init-msg" class="init-loading">
      <div class="spinner"></div>
      <div>기업 목록 불러오는 중... (115,000개)</div>
    </div>

    <div id="bulk-bar" class="bb" style="display:none">
      <input type="checkbox" id="ca" onchange="selPage(this.checked)"/>
      <span style="font-size:13px;color:#1e40af;font-weight:600">현재 페이지 전체선택</span>
      <span id="cc" style="font-size:12px;color:#64748b"></span>
      <div style="margin-left:auto;display:flex;gap:8px">
        <button class="btn bo bs" onclick="selAll()">전체 선택</button>
        <button class="btn bp bs" onclick="saveSel()">✚ 선택 저장</button>
      </div>
    </div>

    <div style="margin-bottom:8px"><span id="rc" style="font-size:13px;color:#64748b"></span></div>
    <div id="cl"></div>
    <div id="pg" class="pg"></div>
  </div>

  <div id="pv" style="display:none">
    <div class="st" id="ss"></div>
    <div style="display:flex;gap:8px;margin-bottom:14px;justify-content:flex-end">
      <button class="btn bge bs" onclick="expCSV()">📥 CSV 내보내기</button>
      <button class="btn bre bs" onclick="clrAll()">전체 삭제</button>
    </div>
    <div id="sl"></div>
  </div>
</div>

<script>
const DART_API = "/api/dart";
const CORPS_JSON = "/corps.json";
const CORPS_LISTED_JSON = "/corps-listed.json";
const PS = 20;

let allCorps = [];       // 전체 기업 목록 (corps.json)
let listedCorps = [];    // 상장사 상세 목록 (corps-listed.json)
let filtered = [];
let results = [];
let page = 1;
let chk = new Set();
let allSel = false;
let saved = JSON.parse(localStorage.getItem("cr4") || "[]");
const nc = {}, dop = new Set();
let stopFlag = false;
let corpsLoaded = false;

// KSIC 업종코드 → 업종명 매핑
const IND_MAP = {
  "01":"농업","02":"임업","03":"어업","05":"석탄광업","06":"원유천연가스","07":"금속광업","08":"비금속광물",
  "10":"식품제조","11":"음료제조","12":"담배제조","13":"섬유제품","14":"의복모피","15":"가죽가방신발",
  "16":"목재나무","17":"펄프종이","18":"인쇄기록","19":"코크스연탄","20":"화학물질",
  "21":"의약품","22":"고무플라스틱","23":"비금속광물제품","24":"1차금속","25":"금속가공",
  "26":"전자부품컴퓨터","27":"의료정밀광학","28":"전기장비","29":"기타기계장비","30":"자동차트레일러",
  "31":"기타운송장비","32":"가구제조","33":"기타제조","35":"전기가스증기","36":"수도업",
  "37":"하수처리","38":"폐기물처리","39":"환경정화복원","41":"건물건설","42":"토목건설",
  "43":"전문직별공사","45":"자동차판매","46":"도매","47":"소매","49":"육상운송",
  "50":"수상운송","51":"항공운송","52":"창고운송서비스","53":"우편통신",
  "55":"숙박업","56":"음식점","58":"출판영상방송","59":"영상오디오제작",
  "60":"방송업","61":"통신업","62":"컴퓨터프로그래밍","63":"정보서비스",
  "64":"금융업","65":"보험업","66":"금융보조","68":"부동산업",
  "70":"연구개발업","71":"전문서비스","72":"건축기술","73":"과학기술서비스",
  "74":"사업지원서비스","75":"공공행정","76":"교육서비스","86":"보건업","87":"사회복지",
  "90":"창작예술","91":"스포츠오락","94":"협회단체","95":"개인서비스",
  "582":"소프트웨어개발","5822":"게임소프트웨어",
};

function getIndNm(code) {
  if (!code || code === "-") return "-";
  // 정확히 일치하는 코드부터 시도, 없으면 앞 2자리
  return IND_MAP[code] || IND_MAP[code.slice(0,4)] || IND_MAP[code.slice(0,3)] || IND_MAP[code.slice(0,2)] || "-";
}
async function initCorps() {
  try {
    // 두 파일 병렬 로드
    const [r1, r2] = await Promise.all([
      fetch(CORPS_JSON),
      fetch(CORPS_LISTED_JSON),
    ]);
    allCorps = await r1.json();
    listedCorps = (await r2.json()).map(c => ({
      ...c,
      industry_nm: c.industry_nm !== "-" ? c.industry_nm : getIndNm(c.industry_code)
    }));
    corpsLoaded = true;

    // 업종 드롭다운 채우기
    const inds = [...new Set(listedCorps.map(c => c.industry_nm).filter(i => i && i !== "-"))].sort();
    const sel = document.getElementById("find");
    inds.forEach(ind => {
      const opt = document.createElement("option");
      opt.value = ind; opt.textContent = ind;
      sel.appendChild(opt);
    });

    document.getElementById("init-msg").style.display = "none";
    document.getElementById("header-sub").textContent =
      `전체 ${allCorps.length.toLocaleString()}개 · 상장사 ${listedCorps.length.toLocaleString()}개 (업종 정보 포함)`;
    document.getElementById("kw").placeholder = "🔍 기업명 검색 (비워두면 필터 조건으로만 검색)";
    document.getElementById("rc").innerHTML =
      `<span style="color:#64748b">기업명 또는 필터를 선택 후 검색하세요</span>`;
  } catch(e) {
    document.getElementById("init-msg").innerHTML =
      `<div style="color:#ef4444">❌ 기업 목록 로드 실패: ${e.message}</div>`;
  }
}

// ─── 검색 ────────────────────────────────────────────────
async function doSearch() {
  if (!corpsLoaded) return alert("기업 목록을 불러오는 중이에요. 잠시 후 시도해주세요.");
  const kw = document.getElementById("kw").value.trim();
  const lst = document.getElementById("fl").value;
  const ind = document.getElementById("find").value;

  if (!kw && !lst && !ind) return alert("기업명 또는 필터를 하나 이상 선택해주세요.");

  stopFlag = false;
  results = [];
  page = 1;
  chk.clear();
  allSel = false;

  document.getElementById("btn-search").disabled = true;
  document.getElementById("btn-stop").style.display = "inline-block";
  document.getElementById("cl").innerHTML = `<div class="loading"><div class="spinner"></div><div>재무정보 조회 중...</div></div>`;
  document.getElementById("bulk-bar").style.display = "none";
  document.getElementById("pg").innerHTML = "";

  // 필터링: 업종/지역 있으면 listedCorps 사용, 없으면 allCorps 사용
  let pool;
  if (ind) {
    // 업종 필터 → listedCorps에서
    pool = listedCorps.filter(c => {
      if (kw && !c.name.includes(kw)) return false;
      if (lst === "Y" && !c.listed) return false;
      if (lst === "N" && c.listed) return false;
      if (ind && c.industry_nm !== ind) return false;
      return true;
    });
  } else {
    // 업종 없으면 allCorps에서 (전체 검색)
    pool = allCorps.filter(c => {
      if (kw && !c.name.includes(kw)) return false;
      if (lst === "Y" && !c.listed) return false;
      if (lst === "N" && c.listed) return false;
      return true;
    });
    // listedCorps의 상세정보 병합
    pool = pool.map(c => {
      const detail = listedCorps.find(l => l.corp_code === c.corp_code);
      return detail ? { ...c, ...detail } : c;
    });
  }

  filtered = pool;
  setStatus(`${filtered.length.toLocaleString()}개 기업 발견 → 재무정보 조회 중...`);
  document.getElementById("rc").innerHTML =
    `총 <b style="color:#1e40af">${filtered.length.toLocaleString()}</b>개 기업`;

  if (!filtered.length) {
    document.getElementById("cl").innerHTML = `<div class="empty"><div style="font-size:36px">🔍</div><p style="margin-top:8px">검색 결과가 없어요</p></div>`;
    endSearch();
    return;
  }

  // 재무정보 조회 (최대 50개)
  const targets = filtered.slice(0, 50);
  const year = String(new Date().getFullYear() - 1);
  let done = 0;

  for (let i = 0; i < targets.length; i += 5) {
    if (stopFlag) break;
    const batch = targets.slice(i, i + 5);
    const batchRes = await Promise.all(batch.map(async c => {
      try {
        const [finRes, detailRes] = await Promise.all([
          fetch(`${DART_API}?action=finance&corp_code=${c.corp_code}&bsns_year=${year}`),
          c.industry_nm ? Promise.resolve(null) : fetch(`${DART_API}?action=company&corp_code=${c.corp_code}`)
        ]);
        const fin = await finRes.json();
        const detail = detailRes ? await detailRes.json() : null;
        const get = nm => {
          const item = (fin.list||[]).find(x => x.account_nm === nm);
          return item ? Math.round(parseInt((item.thstrm_amount||"0").replace(/,/g,"")) / 100000000) : null;
        };
        return {
          ...c,
          industry_nm: c.industry_nm || detail?.induty_nm || "-",
          region: c.region || (detail?.adres ? detail.adres.slice(0,2) : "-"),
          founded: c.founded || (detail?.est_dt ? detail.est_dt.slice(0,4) : "-"),
          employees: c.employees || parseInt(detail?.emp_no) || null,
          homepage: c.homepage || detail?.hm_url || "",
          revenue: get("매출액"),
          profit: get("영업이익"),
          assets: get("자산총계"),
        };
      } catch { return { ...c }; }
    }));
    results.push(...batchRes);
    done += batch.length;
    setStatus(`재무정보 조회 중... (${done}/${Math.min(targets.length, 50)})`);
  }

  // 정렬
  const srt = document.getElementById("fs").value;
  results.sort((a,b) => {
    if (srt==="revenue_desc") return (b.revenue||0)-(a.revenue||0);
    if (srt==="revenue_asc") return (a.revenue||0)-(b.revenue||0);
    if (srt==="employees_desc") return (b.employees||0)-(a.employees||0);
    return a.name.localeCompare(b.name,"ko");
  });

  endSearch();
  setStatus(`✅ ${results.length}개 기업 조회 완료`);
  draw();
}

function stopSearch() { stopFlag = true; endSearch(); setStatus("⏹ 중단됨 — 조회된 기업만 표시"); draw(); }
function endSearch() {
  document.getElementById("btn-search").disabled = false;
  document.getElementById("btn-stop").style.display = "none";
}
function setStatus(msg) { document.getElementById("search-status").textContent = msg; }

// ─── 렌더링 ───────────────────────────────────────────────
function draw() {
  const tot = results.length;
  const tp = Math.ceil(tot / PS) || 1;
  const st = (page-1)*PS;
  const pg = results.slice(st, st+PS);

  document.getElementById("rc").innerHTML = `총 <b style="color:#1e40af">${filtered.length.toLocaleString()}</b>개 중 <b>${tot}</b>개 재무정보 조회됨`;
  document.getElementById("bulk-bar").style.display = tot ? "flex" : "none";
  updBB();

  if (!pg.length) {
    document.getElementById("cl").innerHTML = `<div class="empty"><div style="font-size:36px">🔍</div><p style="margin-top:8px">결과가 없어요</p></div>`;
    document.getElementById("pg").innerHTML = "";
    return;
  }

  document.getElementById("cl").innerHTML = pg.map(c => {
    const ck = allSel || chk.has(c.id);
    const sv = saved.some(s => s.id === c.id);
    const op = dop.has(c.id);
    return `<div class="co${ck?" ck":""}${sv?" sv":""}" id="C${c.id}">
      <div style="display:flex;align-items:flex-start;gap:10px">
        <div style="padding-top:2px"><input type="checkbox"${ck?" checked":""} onchange="tck('${c.id}',this.checked)"/></div>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span style="font-weight:800;font-size:15px;color:#0f172a">${c.name}</span>
            ${c.listed?`<span class="tag" style="background:#eff6ff;color:#1d4ed8">📈 상장</span>`:`<span class="tag" style="background:#f1f5f9;color:#64748b">비상장</span>`}
            ${c.region&&c.region!=="-"?`<span class="tag" style="background:#f8fafc;color:#64748b">${c.region}</span>`:""}
            ${c.industry_nm&&c.industry_nm!=="-"?`<span class="tag" style="background:#e0e7ff;color:#3730a3">${c.industry_nm}</span>`:""}
            ${sv?`<span class="tag" style="background:#dcfce7;color:#15803d">✓ 저장됨</span>`:""}
          </div>
          <div style="font-size:12px;color:#64748b;margin-top:3px">설립 ${c.founded||"-"}년${c.homepage?` · <a href="${c.homepage}" target="_blank" style="color:#1e40af">홈페이지↗</a>`:""}</div>
          <div class="mt">
            <div><div class="l">매출</div><div class="v" style="color:#f59e0b">${fmt(c.revenue)}</div></div>
            <div><div class="l">영업이익</div><div class="v" style="color:${(c.profit||0)>=0?"#10b981":"#ef4444"}">${fmt(c.profit)}</div></div>
            <div><div class="l">자산</div><div class="v" style="color:#7c3aed">${fmt(c.assets)}</div></div>
            ${c.employees?`<div><div class="l">임직원</div><div class="v" style="color:#0ea5e9">${c.employees.toLocaleString()}명</div></div>`:""}
          </div>
        </div>
        <button class="btn bg bs" onclick="tod('${c.id}')" id="BD${c.id}">${op?"▲ 닫기":"▼ 상세"}</button>
      </div>
      <div id="DD${c.id}" style="display:${op?"block":"none"}">
        <div class="di">
          <div style="display:flex;gap:14px;flex-wrap:wrap;color:#1e293b">
            <span><span style="color:#94a3b8">업종: </span>${c.industry_nm||"-"}</span>
            <span><span style="color:#94a3b8">지역: </span>${c.region||"-"}</span>
            <span><span style="color:#94a3b8">설립: </span>${c.founded||"-"}년</span>
            <span><span style="color:#94a3b8">DART코드: </span>${c.corp_code}</span>
          </div>
        </div>
        <div class="nb">
          <div class="nt">📰 최근 뉴스</div>
          <div id="NL${c.id}" style="color:#94a3b8;font-size:12px">불러오는 중...</div>
        </div>
      </div>
    </div>`;
  }).join("");

  pg.filter(c => dop.has(c.id)).forEach(c => lnews(c));
  drawPg(tp);
}

function drawPg(tp) {
  if (tp<=1){document.getElementById("pg").innerHTML="";return;}
  const p=page;
  let h=`<button class="pb" onclick="gp(${p-1})"${p<=1?" disabled":""}>‹</button>`;
  const s=Math.max(1,p-2),e=Math.min(tp,p+2);
  if(s>1)h+=`<button class="pb" onclick="gp(1)">1</button>${s>2?`<span style="color:#94a3b8">…</span>`:""}`;
  for(let i=s;i<=e;i++)h+=`<button class="pb${i===p?" ac":""}" onclick="gp(${i})">${i}</button>`;
  if(e<tp)h+=`${e<tp-1?`<span style="color:#94a3b8">…</span>`:""}<button class="pb" onclick="gp(${tp})">${tp}</button>`;
  h+=`<button class="pb" onclick="gp(${p+1})"${p>=tp?" disabled":""}>›</button>`;
  document.getElementById("pg").innerHTML=h;
}

function gp(p){page=p;chk.clear();draw();window.scrollTo({top:0,behavior:"smooth"});}

// ─── 상세 & 뉴스 ─────────────────────────────────────────
function tod(id){
  const el=document.getElementById("DD"+id);
  const bt=document.getElementById("BD"+id);
  const op=el.style.display!=="none";
  el.style.display=op?"none":"block";
  bt.textContent=op?"▼ 상세":"▲ 닫기";
  if(!op){dop.add(id);const c=results.find(x=>x.id===id);if(c)lnews(c);}
  else dop.delete(id);
}

async function lnews(c){
  const el=document.getElementById("NL"+c.id);
  if(!el)return;
  if(nc[c.id]){rNews(c.id,nc[c.id]);return;}
  try{
    const rss=`https://news.google.com/rss/search?q=${encodeURIComponent(c.name)}&hl=ko&gl=KR`;
    const proxies=[
      `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rss)}`,
      `https://api.allorigins.win/raw?url=${encodeURIComponent(rss)}`,
    ];
    let items=null;
    for(const px of proxies){
      try{
        const r=await fetch(px,{signal:AbortSignal.timeout(6000)});
        if(!r.ok)continue;
        if(px.includes("rss2json")){
          const d=await r.json();
          if(d.status==="ok"&&d.items?.length){
            items=d.items.slice(0,3).map(i=>({title:i.title||"",source:i.author||"",date:i.pubDate||""}));
            break;
          }
        } else {
          const xml=await r.text();
          if(!xml||!xml.includes("<item>"))continue;
          const doc=new DOMParser().parseFromString(xml,"text/xml");
          const its=[...doc.querySelectorAll("item")].slice(0,3);
          if(its.length){items=its.map(i=>({title:i.querySelector("title")?.textContent||"",source:i.querySelector("source")?.textContent||"",date:i.querySelector("pubDate")?.textContent||""}));break;}
        }
      }catch{continue;}
    }
    nc[c.id]=items||[];
    rNews(c.id,items||[]);
  }catch{if(el)el.textContent="뉴스를 불러올 수 없어요";}
}

function rNews(id,items){
  const el=document.getElementById("NL"+id);
  if(!el)return;
  if(!items.length){el.textContent="최근 뉴스가 없어요";return;}
  el.innerHTML=items.map(n=>`<div class="ni"><span style="color:#fb923c;flex-shrink:0">▸</span><div><div style="color:#1e293b;font-weight:500;line-height:1.5">${n.title}</div><div style="color:#94a3b8;font-size:11px;margin-top:2px">${n.source}${n.source&&n.date?" · ":""}${n.date?new Date(n.date).toLocaleDateString("ko-KR"):""}</div></div></div>`).join("");
}

// ─── 체크박스 ─────────────────────────────────────────────
function tck(id,v){
  allSel=false;v?chk.add(id):chk.delete(id);
  const el=document.getElementById("C"+id);
  if(el){const sv=saved.some(s=>s.id===id);el.className=`co${v?" ck":""}${sv?" sv":""}`;}
  updBB();
}
function selPage(v){allSel=false;const st=(page-1)*PS;results.slice(st,st+PS).forEach(c=>v?chk.add(c.id):chk.delete(c.id));draw();}
function selAll(){allSel=true;results.forEach(c=>chk.add(c.id));draw();}
function updBB(){
  const cnt=allSel?results.length:chk.size;
  document.getElementById("cc").textContent=cnt>0?`${cnt}개 선택됨`:"";
  const st=(page-1)*PS;
  const pg=results.slice(st,st+PS);
  document.getElementById("ca").checked=pg.length>0&&pg.every(c=>chk.has(c.id));
}
function saveSel(){
  const ts=allSel?results:results.filter(c=>chk.has(c.id));
  let n=0;
  ts.forEach(c=>{if(!saved.some(s=>s.id===c.id)){saved.push(c);n++;}});
  sv();draw();alert(`✅ ${n}개 저장 (전체 ${saved.length}개)`);
}

// ─── 저장 관리 ────────────────────────────────────────────
const sv=()=>{localStorage.setItem("cr4",JSON.stringify(saved));document.getElementById("t2").textContent=`📋 저장 리스트 (${saved.length})`;};
function drwSaved(){
  document.getElementById("ss").innerHTML=[
    ["전체",saved.length,"#1e40af"],
    ["상장",saved.filter(c=>c.listed).length,"#1d4ed8"],
    ["비상장",saved.filter(c=>!c.listed).length,"#64748b"],
  ].map(([l,n,c])=>`<div class="sc" style="border-left:4px solid ${c}"><div class="n" style="color:${c}">${n}</div><div class="l">${l}</div></div>`).join("");
  if(!saved.length){document.getElementById("sl").innerHTML=`<div class="empty"><div style="font-size:36px">📋</div><p style="margin-top:8px">검색 탭에서 저장해보세요!</p></div>`;return;}
  document.getElementById("sl").innerHTML=saved.map(c=>`
    <div class="co sv">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
        <div>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span style="font-weight:800;font-size:15px;color:#0f172a">${c.name}</span>
            ${c.listed?`<span class="tag" style="background:#eff6ff;color:#1d4ed8">📈 상장</span>`:""}
            ${c.industry_nm&&c.industry_nm!=="-"?`<span class="tag" style="background:#e0e7ff;color:#3730a3">${c.industry_nm}</span>`:""}
          </div>
          <div class="mt">
            <div><div class="l">매출</div><div class="v" style="color:#f59e0b">${fmt(c.revenue)}</div></div>
            <div><div class="l">임직원</div><div class="v" style="color:#0ea5e9">${c.employees?c.employees.toLocaleString()+"명":"-"}</div></div>
          </div>
        </div>
        <button class="btn bre bs" onclick="rmSv('${c.id}')">삭제</button>
      </div>
    </div>`).join("");
}
function rmSv(id){saved=saved.filter(c=>c.id!==id);sv();drwSaved();}
function clrAll(){if(confirm("전체 삭제할까요?")){saved=[];sv();drwSaved();}}
function expCSV(){
  const rows=[["기업명","업종","지역","상장","매출(억)","영업이익(억)","자산(억)","임직원","설립연도","DART코드"]];
  saved.forEach(c=>rows.push([c.name,c.industry_nm||"-",c.region||"-",c.listed?"상장":"비상장",c.revenue??"-",c.profit??"-",c.assets??"-",c.employees??"-",c.founded||"-",c.corp_code]));
  const csv=rows.map(r=>r.map(v=>`"${v}"`).join(",")).join("\n");
  const b=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="기업리스트.csv";a.click();
}

// ─── 탭 전환 ─────────────────────────────────────────────
function switchTab(t){
  document.getElementById("ps").style.display=t==="search"?"block":"none";
  document.getElementById("pv").style.display=t==="saved"?"block":"none";
  document.getElementById("t1").className="tab"+(t==="search"?" active":"");
  document.getElementById("t2").className="tab"+(t==="saved"?" active":"");
  if(t==="saved")drwSaved();
}

// ─── 유틸 ────────────────────────────────────────────────
const fmt=v=>{
  if(v==null)return"-";
  if(Math.abs(v)>=10000)return`${(v/10000).toFixed(1)}조`;
  if(Math.abs(v)>=1000)return`${(v/1000).toFixed(0)}천억`;
  if(Math.abs(v)>=1)return`${Math.round(v)}억`;
  return"-";
};

// Enter 키 검색
document.getElementById("kw").addEventListener("keydown", e => { if(e.key==="Enter") doSearch(); });

// 초기화
initCorps();
</script>
