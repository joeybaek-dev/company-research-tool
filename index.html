<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>기업 리서치 툴</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Apple SD Gothic Neo",Pretendard,sans-serif;background:#f1f5f9;min-height:100vh;padding:20px}
.wrap{max-width:1000px;margin:0 auto}
.header{background:linear-gradient(135deg,#0f172a,#1e40af);border-radius:16px;padding:20px 26px;margin-bottom:16px;color:#fff}
.header h1{font-size:20px;font-weight:800}
.header p{margin-top:5px;opacity:.8;font-size:13px}
.tabs{display:flex;gap:8px;margin-bottom:16px}
.tab{padding:9px 20px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:13px;background:#fff;color:#64748b;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.tab.active{background:#1e40af;color:#fff}
.card{background:#fff;border-radius:14px;padding:20px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
input,select{padding:8px 12px;border-radius:8px;border:1.5px solid #e2e8f0;font-size:13px;font-family:inherit}
input:focus,select:focus{outline:none;border-color:#1e40af}
.search-input{width:100%;padding:11px 14px;border-radius:10px;font-size:14px;margin-bottom:14px}
.filter-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.filter-item{flex:1;min-width:130px}
.filter-item label{font-size:11px;color:#94a3b8;display:block;margin-bottom:3px}
.filter-item select,.filter-item input{width:100%}
.btn{padding:9px 20px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:13px}
.btn-primary{background:#1e40af;color:#fff}
.btn-outline{background:#fff;color:#1e40af;border:1.5px solid #1e40af}
.btn-green{background:#10b981;color:#fff}
.btn-red{background:#fff;color:#ef4444;border:1.5px solid #fca5a5}
.btn-sm{padding:6px 12px;font-size:12px}
.btn:disabled{background:#e2e8f0;color:#94a3b8;cursor:default}
.company-card{background:#fff;border-radius:12px;padding:16px 18px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:2px solid transparent}
.company-card.saved{border-color:#1e40af}
.tag{font-size:11px;padding:2px 8px;border-radius:20px;display:inline-block}
.metrics{display:flex;gap:16px;margin-top:8px;flex-wrap:wrap}
.metric .lbl{font-size:10px;color:#94a3b8}
.metric .val{font-size:14px;font-weight:800}
.stats{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.stat{flex:1;min-width:90px;background:#fff;border-radius:10px;padding:10px 14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.stat .num{font-size:20px;font-weight:800}
.stat .lbl{font-size:12px;color:#64748b}
.spinner{width:32px;height:32px;border:4px solid #e0e7ff;border-top-color:#1e40af;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:50px;color:#64748b}
.empty{text-align:center;padding:60px;color:#94a3b8}
.error{background:#fee2e2;border-radius:10px;padding:12px 16px;color:#b91c1c;font-size:13px;margin-bottom:14px}
.hidden{display:none}
.progress{font-size:12px;color:#64748b;margin-left:10px}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>🏢 기업 리서치 & 리스트업 툴</h1>
    <p>DART 재무정보 기반 · 업종/규모/매출 필터 · 뉴스 핫기업 분석</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('search')">🔍 기업 검색</button>
    <button class="tab" id="tab-saved" onclick="switchTab('saved')">📋 저장 리스트 (0)</button>
  </div>

  <!-- 검색 탭 -->
  <div id="panel-search">
    <div class="card">
      <input type="text" class="search-input" id="keyword" placeholder="🔍 키워드 검색 (기업명, 업종, 지역...)"/>
      <div class="filter-row">
        <div class="filter-item">
          <label>업종 (KSIC 대분류)</label>
          <select id="f-industry">
            <option value="">전체</option>
            <option value="C">제조업</option>
            <option value="J">정보통신업</option>
            <option value="M">전문·과학·기술</option>
            <option value="Q">보건·사회복지</option>
            <option value="G">도매·소매업</option>
            <option value="K">금융·보험업</option>
            <option value="F">건설업</option>
            <option value="A">농업·임업·어업</option>
          </select>
        </div>
        <div class="filter-item">
          <label>기업 규모</label>
          <select id="f-size">
            <option value="">전체</option>
            <option value="large">대기업 (매출 1조+)</option>
            <option value="mid">중견 (100억~1조)</option>
            <option value="small">중소 (100억 미만)</option>
          </select>
        </div>
        <div class="filter-item">
          <label>상장 여부</label>
          <select id="f-listed">
            <option value="">전체</option>
            <option value="Y">상장사만</option>
            <option value="N">비상장사만</option>
          </select>
        </div>
        <div class="filter-item">
          <label>정렬</label>
          <select id="f-sort">
            <option value="revenue_desc">매출액 높은 순</option>
            <option value="revenue_asc">매출액 낮은 순</option>
            <option value="employees_desc">임직원 많은 순</option>
            <option value="name_asc">기업명 가나다순</option>
          </select>
        </div>
      </div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <button class="btn btn-primary" id="btn-load" onclick="loadCompanies()">🔄 기업 데이터 불러오기</button>
        <button class="btn btn-outline" onclick="applyFilter()">🔍 필터 적용</button>
        <span id="progress" class="progress"></span>
      </div>
    </div>

    <div id="error" class="error hidden"></div>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <div>DART에서 기업 데이터를 불러오는 중...</div>
      <div id="load-msg" style="font-size:12px;color:#94a3b8;margin-top:6px"></div>
    </div>

    <div id="result-header" class="hidden" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px">
      <span id="result-count" style="font-size:13px;color:#64748b"></span>
      <button class="btn btn-outline btn-sm" onclick="saveAll()">검색결과 전체 저장</button>
    </div>

    <div id="company-list"></div>
  </div>

  <!-- 저장 탭 -->
  <div id="panel-saved" class="hidden">
    <div class="stats" id="saved-stats"></div>
    <div style="display:flex;gap:10px;margin-bottom:14px;justify-content:flex-end;flex-wrap:wrap">
      <button class="btn btn-green btn-sm" onclick="exportCSV()">📥 CSV 내보내기</button>
      <button class="btn btn-red btn-sm" onclick="clearAll()">전체 삭제</button>
    </div>
    <div id="saved-list"></div>
  </div>
</div>

<script>
// ─── 설정 ────────────────────────────────────────────────
const API_BASE = "/api/dart";

let allCompanies = [];
let filtered = [];
let savedList = JSON.parse(localStorage.getItem("company_saved") || "[]");

// ─── DART API 호출 ────────────────────────────────────────
async function dartAPI(endpoint, params = {}) {
  const query = new URLSearchParams({ endpoint, ...params }).toString();
  const res = await fetch(`${API_BASE}?${query}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// ─── 기업 데이터 로드 ─────────────────────────────────────
async function loadCompanies() {
  showLoading(true);
  setError("");
  allCompanies = [];

  try {
    setMsg("상장기업 목록 불러오는 중...");
    // DART 상장기업 목록
    const data = await dartAPI("corpCode.xml"); // ZIP 형태라 아래 방식으로 대체
    // 재무정보 있는 기업 목록
    const year = new Date().getFullYear() - 1;
    setMsg("기업 재무정보 조회 중...");

    // 복수 기업 재무정보 한번에 조회
    const finData = await dartAPI("fnlttMultiAcnt.json", {
      bsns_year: year,
      reprt_code: "11011", // 사업보고서
      fs_div: "OFS" // 개별재무제표
    });

    if (finData.status !== "000") throw new Error(finData.message);

    // 기업별로 그룹핑
    const corpMap = {};
    (finData.list || []).forEach(item => {
      if (!corpMap[item.corp_code]) {
        corpMap[item.corp_code] = {
          corp_code: item.corp_code,
          name: item.corp_name,
          stock_code: item.stock_code,
          listed: !!item.stock_code,
          revenue: null, profit: null, assets: null,
        };
      }
      const v = parseInt((item.thstrm_amount || "0").replace(/,/g, "")) / 100000000; // 억원
      if (item.account_nm === "매출액") corpMap[item.corp_code].revenue = v;
      if (item.account_nm === "영업이익") corpMap[item.corp_code].profit = v;
      if (item.account_nm === "자산총계") corpMap[item.corp_code].assets = v;
    });

    // 기업 상세정보 추가 (샘플 10개만)
    const corps = Object.values(corpMap).slice(0, 200);
    setMsg(`${corps.length}개 기업 정보 조회 중...`);

    const results = await Promise.all(
      corps.slice(0, 30).map(async (c) => {
        try {
          const detail = await dartAPI("company.json", { corp_code: c.corp_code });
          return {
            ...c,
            industry_nm: detail.induty_nm || "-",
            industry_code: detail.induty_code || "",
            region: detail.adres?.slice(0, 2) || "-",
            founded: detail.est_dt?.slice(0, 4) || "-",
            employees: parseInt(detail.emp_no) || null,
            homepage: detail.hm_url || "",
          };
        } catch {
          return { ...c, industry_nm: "-", region: "-" };
        }
      })
    );

    allCompanies = results.filter(c => c.name);
    showLoading(false);
    applyFilter();
    setProgress(`✅ ${allCompanies.length}개 기업 로드 완료`);
  } catch (e) {
    showLoading(false);
    setError(`데이터 로드 실패: ${e.message}`);
  }
}

// ─── 필터 & 정렬 ──────────────────────────────────────────
function applyFilter() {
  const kw = document.getElementById("keyword").value.toLowerCase();
  const ind = document.getElementById("f-industry").value;
  const size = document.getElementById("f-size").value;
  const listed = document.getElementById("f-listed").value;
  const sort = document.getElementById("f-sort").value;

  filtered = allCompanies.filter(c => {
    const rev = c.revenue || 0;
    return (
      (!kw || c.name?.toLowerCase().includes(kw) || c.industry_nm?.includes(kw) || c.region?.includes(kw)) &&
      (!ind || (c.industry_code || "").startsWith(ind)) &&
      (!size || (size==="large"&&rev>=10000)||(size==="mid"&&rev>=100&&rev<10000)||(size==="small"&&rev<100)) &&
      (!listed || (listed==="Y"?c.listed:!c.listed))
    );
  }).sort((a, b) => {
    if (sort==="revenue_desc") return (b.revenue||0)-(a.revenue||0);
    if (sort==="revenue_asc") return (a.revenue||0)-(b.revenue||0);
    if (sort==="employees_desc") return (b.employees||0)-(a.employees||0);
    if (sort==="name_asc") return (a.name||"").localeCompare(b.name||"","ko");
    return 0;
  });

  renderResults();
}

// ─── 렌더링 ───────────────────────────────────────────────
function renderResults() {
  const rh = document.getElementById("result-header");
  rh.classList.remove("hidden");
  rh.style.display = "flex";
  document.getElementById("result-count").innerHTML =
    `총 <b style="color:#1e40af">${filtered.length}</b>개 기업`;

  if (!filtered.length) {
    document.getElementById("company-list").innerHTML =
      `<div class="empty"><div style="font-size:36px">🔍</div><p style="margin-top:8px">조건에 맞는 기업이 없어요</p></div>`;
    return;
  }

  document.getElementById("company-list").innerHTML = filtered.slice(0, 100).map((c, i) => `
    <div class="company-card ${isSaved(c.corp_code)?"saved":""}" id="card-${c.corp_code}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px">
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span style="font-size:12px;font-weight:800;color:#94a3b8">#${i+1}</span>
            <span style="font-weight:800;font-size:15px;color:#0f172a">${c.name}</span>
            ${c.listed?`<span class="tag" style="background:#eff6ff;color:#1d4ed8">📈 상장</span>`:`<span class="tag" style="background:#f1f5f9;color:#64748b">비상장</span>`}
            ${c.region&&c.region!=="-"?`<span class="tag" style="background:#f8fafc;color:#64748b">${c.region}</span>`:""}
          </div>
          <div style="font-size:12px;color:#64748b;margin-top:4px">${c.industry_nm||"-"} · 설립 ${c.founded||"-"}년${c.homepage?` · <a href="${c.homepage}" target="_blank" style="color:#1e40af">홈페이지</a>`:""}</div>
          <div class="metrics">
            <div class="metric"><div class="lbl">매출</div><div class="val" style="color:#f59e0b">${c.revenue!=null?fmt(c.revenue)+"억":"-"}</div></div>
            <div class="metric"><div class="lbl">영업이익</div><div class="val" style="color:${(c.profit||0)>=0?"#10b981":"#ef4444"}">${c.profit!=null?fmt(c.profit)+"억":"-"}</div></div>
            <div class="metric"><div class="lbl">자산</div><div class="val" style="color:#7c3aed">${c.assets!=null?fmt(c.assets)+"억":"-"}</div></div>
            ${c.employees?`<div class="metric"><div class="lbl">임직원</div><div class="val" style="color:#0ea5e9">${c.employees.toLocaleString()}명</div></div>`:""}
          </div>
        </div>
        <button class="btn btn-sm ${isSaved(c.corp_code)?"btn-primary":"btn-outline"}" onclick="toggleSave('${c.corp_code}')">
          ${isSaved(c.corp_code)?"✓ 저장됨":"+ 저장"}
        </button>
      </div>
    </div>
  `).join("");
}

function renderSaved() {
  document.getElementById("saved-stats").innerHTML = [
    ["전체", savedList.length, "#1e40af"],
    ["상장", savedList.filter(c=>c.listed).length, "#1d4ed8"],
    ["비상장", savedList.filter(c=>!c.listed).length, "#64748b"],
  ].map(([l,n,c])=>`<div class="stat" style="border-left:4px solid ${c}"><div class="num" style="color:${c}">${n}</div><div class="lbl">${l}</div></div>`).join("");

  if (!savedList.length) {
    document.getElementById("saved-list").innerHTML = `<div class="empty"><div style="font-size:36px">📋</div><p style="margin-top:8px">검색 탭에서 기업을 저장해보세요!</p></div>`;
    return;
  }
  document.getElementById("saved-list").innerHTML = savedList.map(c=>`
    <div class="company-card saved">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
        <div>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span style="font-weight:800;font-size:15px;color:#0f172a">${c.name}</span>
            ${c.listed?`<span class="tag" style="background:#eff6ff;color:#1d4ed8">📈 상장</span>`:""}
            ${c.region&&c.region!=="-"?`<span class="tag" style="background:#f1f5f9;color:#64748b">${c.region}</span>`:""}
          </div>
          <div style="font-size:12px;color:#64748b;margin-top:3px">${c.industry_nm||"-"}</div>
          <div class="metrics">
            <div class="metric"><div class="lbl">매출</div><div class="val" style="color:#f59e0b">${c.revenue!=null?fmt(c.revenue)+"억":"-"}</div></div>
            <div class="metric"><div class="lbl">영업이익</div><div class="val" style="color:#10b981">${c.profit!=null?fmt(c.profit)+"억":"-"}</div></div>
          </div>
        </div>
        <button class="btn btn-red btn-sm" onclick="removeSaved('${c.corp_code}')">삭제</button>
      </div>
    </div>
  `).join("");
}

// ─── 저장 관리 ────────────────────────────────────────────
const isSaved = id => savedList.some(c=>c.corp_code===id);
const saveStorage = () => { localStorage.setItem("company_saved", JSON.stringify(savedList)); document.getElementById("tab-saved").textContent=`📋 저장 리스트 (${savedList.length})`; };
function toggleSave(id) {
  const c = allCompanies.find(c=>c.corp_code===id);
  if (!c) return;
  isSaved(id) ? savedList=savedList.filter(s=>s.corp_code!==id) : savedList.push(c);
  saveStorage(); renderResults();
}
function removeSaved(id) { savedList=savedList.filter(c=>c.corp_code!==id); saveStorage(); renderSaved(); }
function saveAll() { filtered.forEach(c=>{if(!isSaved(c.corp_code))savedList.push(c);}); saveStorage(); renderResults(); }
function clearAll() { if(confirm("전체 삭제할까요?")){ savedList=[]; saveStorage(); renderSaved(); } }

// ─── CSV 내보내기 ─────────────────────────────────────────
function exportCSV() {
  const rows=[["기업명","업종","지역","상장","매출(억)","영업이익(억)","자산(억)","임직원","설립연도","DART코드"]];
  savedList.forEach(c=>rows.push([c.name,c.industry_nm||"-",c.region||"-",c.listed?"상장":"비상장",c.revenue??"-",c.profit??"-",c.assets??"-",c.employees??"-",c.founded||"-",c.corp_code]));
  const csv=rows.map(r=>r.map(v=>`"${v}"`).join(",")).join("\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="기업리스트.csv";a.click();
}

// ─── 탭 전환 ─────────────────────────────────────────────
function switchTab(t) {
  document.getElementById("panel-search").classList.toggle("hidden", t!=="search");
  document.getElementById("panel-saved").classList.toggle("hidden", t!=="saved");
  document.querySelectorAll(".tab").forEach((el,i)=>el.classList.toggle("active",(i===0)===(t==="search")));
  if(t==="saved") renderSaved();
}

// ─── UI 헬퍼 ─────────────────────────────────────────────
const fmt = v => { if(v==null)return"-"; if(v>=10000)return`${(v/10000).toFixed(1)}조`; if(v>=1000)return`${(v/1000).toFixed(0)}천`; return Math.round(v).toLocaleString(); };
function showLoading(v) { document.getElementById("loading").classList.toggle("hidden",!v); document.getElementById("company-list").innerHTML=""; document.getElementById("result-header").classList.add("hidden"); }
function setError(msg) { const el=document.getElementById("error"); el.textContent=msg; el.classList.toggle("hidden",!msg); }
function setProgress(msg) { document.getElementById("progress").textContent=msg; }
function setMsg(msg) { document.getElementById("load-msg").textContent=msg; }
</script>
</body>
</html>
