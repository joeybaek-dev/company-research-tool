.fr{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:0}
.fi{flex:1;min-width:130px}

.bp{background:#1e40af;color:#fff}

.bo{background:#fff;color:#1e40af;border:1.5px solid #1e40af}
.bge{background:#10b981;color:#fff}
.bre{background:#fff;color:#ef4444;border:1.5px solid #fca5a5}
.bs{padding:6px 12px;font-size:12px}
.co{background:#fff;border-radius:12px;padding:16px 18px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:2px solid transparent}
.co.ck{border-color:#1e40af;background:#fafbff}
.co.sv{border-color:#10b981}
.tag{font-size:11px;padding:2px 8px;border-radius:20px;display:inline-block}
.mt{display:flex;gap:14px;margin-top:8px;flex-wrap:wrap}
.mt .l{font-size:10px;color:#94a3b8}
.mt .v{font-size:14px;font-weight:800}
.bb{display:flex;gap:8px;align-items:center;padding:10px 14px;background:#eff6ff;border-radius:10px;margin-bottom:10px;flex-wrap:wrap}

.pg{display:flex;gap:6px;align-items:center;justify-content:center;margin-top:16px;flex-wrap:wrap}
.pb{padding:6px 12px;border-radius:8px;border:1.5px solid #e2e8f0;background:#fff;color:#64748b;font-size:13px;cursor:pointer;font-weight:600}
.pb.ac{background:#1e40af;color:#fff;border-color:#1e40af}

.empty{text-align:center;padding:60px;color:#94a3b8}
.di{padding:12px 14px;background:#f8fafc;border-radius:10px;margin-top:10px;font-size:12px}
.nb{padding:12px 14px;background:#fff7ed;border-radius:10px;border:1px solid #fed7aa;margin-top:8px}
.nt{font-weight:700;color:#c2410c;margin-bottom:8px;font-size:12px}

];

const PS=10;
let filtered=[...D], page=1, chk=new Set(), allSel=false;
let saved=JSON.parse(localStorage.getItem("cr3")||"[]");
const nc={}, dop=new Set();

function fmt(v){
  if(!v)return"-";
  const a=v/100;
  if(a>=10000)return`${(a/10000).toFixed(1)}조`;
  if(a>=1000)return`${(a/1000).toFixed(0)}천억`;
  if(a>=1)return`${Math.round(a)}억`;
  return`${v}백만`;
}

function go(){
  const kw=document.getElementById("kw").value.toLowerCase();
  const ind=document.getElementById("fi").value;
  const emp=document.getElementById("fe").value;
  const lst=document.getElementById("fl").value;
  const srt=document.getElementById("fs").value;

  filtered=D.filter(c=>{
    if(kw&&!c.name.toLowerCase().includes(kw)&&!c.desc.includes(kw))return false;
    if(ind&&c.ind!==ind)return false;
    if(emp){const[a,b]=emp.split(",").map(Number);if(c.emp<a||c.emp>b)return false;}
    if(lst==="Y"&&!c.listed)return false;
    if(lst==="N"&&c.listed)return false;
    return true;
  }).sort((a,b)=>{
    if(srt==="revenue_desc")return b.revenue-a.revenue;
    if(srt==="revenue_asc")return a.revenue-b.revenue;
    if(srt==="employees_desc")return b.emp-a.emp;
    if(srt==="employees_asc")return a.emp-b.emp;
    return a.name.localeCompare(b.name,"ko");
  });

  page=1; chk.clear(); allSel=false; draw();
}

function draw(){
  const tot=filtered.length;
  const tp=Math.ceil(tot/PS)||1;
  const st=(page-1)*PS;
  const pg=filtered.slice(st,st+PS);

  document.getElementById("rc").innerHTML=`총 <b style="color:#1e40af">${tot}</b>개 기업`;
  document.getElementById("bb").style.display=tot?"flex":"none";
  updBB();

  if(!pg.length){
    document.getElementById("cl").innerHTML=`<div class="empty"><div style="font-size:36px">🔍</div><p style="margin-top:8px">조건에 맞는 기업이 없어요</p></div>`;
    document.getElementById("pg").innerHTML="";
    return;
  }

  document.getElementById("cl").innerHTML=pg.map(c=>{
    const ck=allSel||chk.has(c.id);
    const sv=saved.some(s=>s.id===c.id);
    const op=dop.has(c.id);
    return`<div class="co${ck?" ck":""}${sv?" sv":""}" id="C${c.id}">
      <div style="display:flex;align-items:flex-start;gap:10px">
        <div style="padding-top:2px"><input type="checkbox"${ck?" checked":""} onchange="tck('${c.id}',this.checked)"/></div>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span style="font-weight:800;font-size:15px;color:#0f172a">${c.name}</span>
            ${c.listed?`<span class="tag" style="background:#eff6ff;color:#1d4ed8">📈 상장</span>`:`<span class="tag" style="background:#f1f5f9;color:#64748b">비상장</span>`}
            <span class="tag" style="background:#f1f5f9;color:#64748b">${c.region}</span>
            <span class="tag" style="background:#e0e7ff;color:#3730a3">${c.ind}</span>
            ${sv?`<span class="tag" style="background:#dcfce7;color:#15803d">✓ 저장됨</span>`:""}
          </div>
          <div style="font-size:12px;color:#64748b;margin-top:3px">${c.desc} · 설립 ${c.founded}년</div>
          <div class="mt">
            <div><div class="l">매출</div><div class="v" style="color:#f59e0b">${fmt(c.revenue)}</div></div>
            <div><div class="l">임직원</div><div class="v" style="color:#0ea5e9">${c.emp.toLocaleString()}명</div></div>
          </div>
        </div>
        <button class="btn bg bs" onclick="tod('${c.id}')" id="BD${c.id}">${op?"▲ 닫기":"▼ 상세"}</button>
      </div>
      <div id="DD${c.id}" style="display:${op?"block":"none"}">
        <div class="di">
          <div style="display:flex;gap:14px;flex-wrap:wrap">
            <span><span style="color:#94a3b8">업종: </span>${c.ind}</span>
            <span><span style="color:#94a3b8">지역: </span>${c.region}</span>
            <span><span style="color:#94a3b8">설립: </span>${c.founded}년</span>
            <span><span style="color:#94a3b8">임직원: </span><b style="color:#0ea5e9">${c.emp.toLocaleString()}명</b></span>
            <span><span style="color:#94a3b8">매출: </span><b style="color:#f59e0b">${fmt(c.revenue)}</b></span>
          </div>
        </div>
        <div class="nb" id="NB${c.id}">
          <div class="nt">📰 최근 뉴스</div>
          <div id="NL${c.id}" style="color:#94a3b8;font-size:12px">불러오는 중...</div>
        </div>
      </div>
    </div>`;
  }).join("");

  pg.filter(c=>dop.has(c.id)).forEach(c=>lnews(c));
  drawPg(tp);
}

function drawPg(tp){
  if(tp<=1){document.getElementById("pg").innerHTML="";return;}
  const p=page;
  let h=`<button class="pb" onclick="gp(${p-1})"${p<=1?" disabled":""}>‹</button>`;
  const s=Math.max(1,p-2),e=Math.min(tp,p+2);
  if(s>1)h+=`<button class="pb" onclick="gp(1)">1</button>${s>2?`<span>…</span>`:""}`;
  for(let i=s;i<=e;i++)h+=`<button class="pb${i===p?" ac":""}" onclick="gp(${i})">${i}</button>`;
  if(e<tp)h+=`${e<tp-1?`<span>…</span>`:""}<button class="pb" onclick="gp(${tp})">${tp}</button>`;
  h+=`<button class="pb" onclick="gp(${p+1})"${p>=tp?" disabled":""}>›</button>`;
  document.getElementById("pg").innerHTML=h;
}

function gp(p){page=p;chk.clear();draw();window.scrollTo({top:0,behavior:"smooth"});}

function tod(id){
  const el=document.getElementById("DD"+id);
  const bt=document.getElementById("BD"+id);
  const op=el.style.display!=="none";
  el.style.display=op?"none":"block";
  bt.textContent=op?"▼ 상세":"▲ 닫기";
  if(!op){dop.add(id);const c=D.find(x=>x.id===id);if(c)lnews(c);}
  else dop.delete(id);
}

async function lnews(c){
  const el=document.getElementById("NL"+c.id);
  if(!el)return;
  if(nc[c.id]){rNews(c.id,nc[c.id]);return;}
  try{
    // 구글 뉴스 RSS - 다양한 URL 형식 시도
    const rssUrls=[
      `https://news.google.com/rss/search?q=${encodeURIComponent(c.name+" 기업")}&hl=ko&gl=KR`,
      `https://news.google.com/rss/search?q=${encodeURIComponent(c.name)}&hl=ko`,
    ];
    const proxies=[
      (u)=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
      (u)=>`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(u)}`,
    ];
    let items=null;
    for(const rss of rssUrls){
      for(const mkProxy of proxies){
        try{
          const px=mkProxy(rss);
          const r=await fetch(px,{signal:AbortSignal.timeout(6000)});
          if(!r.ok)continue;
          // rss2json 방식
          if(px.includes("rss2json")){
            const d=await r.json();
            if(d.status==="ok"&&d.items?.length){
              items=d.items.slice(0,3).map(i=>({
                title:i.title||"",
                source:i.author||"",
                date:i.pubDate||"",
              }));
              break;
            }
          } else {
            // raw XML 방식
            const xml=await r.text();
            if(!xml||!xml.includes("<item>"))continue;
            const doc=new DOMParser().parseFromString(xml,"text/xml");
            const its=[...doc.querySelectorAll("item")].slice(0,3);
            if(its.length){
              items=its.map(i=>({
                title:i.querySelector("title")?.textContent||"",
                source:i.querySelector("source")?.textContent||"",
                date:i.querySelector("pubDate")?.textContent||"",
              }));
              break;
            }
          }
        }catch{continue;}
      }
      if(items)break;
    }
    if(!items||!items.length)throw new Error("no items");
    nc[c.id]=items;
    rNews(c.id,items);
  }catch{if(el)el.textContent="최근 뉴스가 없어요";}
}

function rNews(id,items){
  const el=document.getElementById("NL"+id);
  if(!el)return;
  if(!items.length){el.textContent="최근 뉴스가 없어요";return;}
  el.innerHTML=items.map((n,i)=>`
    <div class="ni">
      <span style="color:#fb923c;flex-shrink:0">▸</span>
      <div>
        <div style="color:#1e293b;font-weight:500;line-height:1.5">${n.title}</div>
        <div style="color:#94a3b8;font-size:11px;margin-top:2px">${n.source}${n.source&&n.date?" · ":""}${n.date?new Date(n.date).toLocaleDateString("ko-KR"):""}</div>
      </div>
    </div>`).join("");
}

function tck(id,v){
  allSel=false;
  v?chk.add(id):chk.delete(id);
  const el=document.getElementById("C"+id);
  if(el){const sv=saved.some(s=>s.id===id);el.className=`co${v?" ck":""}${sv?" sv":""}`;}
  updBB();
}
function selPage(v){
  allSel=false;
  const st=(page-1)*PS;
  filtered.slice(st,st+PS).forEach(c=>v?chk.add(c.id):chk.delete(c.id));
  draw();
}
function selAll(){allSel=true;filtered.forEach(c=>chk.add(c.id));draw();}
function updBB(){
  const cnt=allSel?filtered.length:chk.size;
  document.getElementById("cc").textContent=cnt>0?`${cnt}개 선택됨`:"";
  const st=(page-1)*PS;
  const pg=filtered.slice(st,st+PS);
  document.getElementById("ca").checked=pg.length>0&&pg.every(c=>chk.has(c.id));
}
function saveSel(){
  const ts=allSel?filtered:filtered.filter(c=>chk.has(c.id));
  let n=0;
  ts.forEach(c=>{if(!saved.some(s=>s.id===c.id)){saved.push(c);n++;}});
  sv();draw();alert(`✅ ${n}개 저장 (전체 ${saved.length}개)`);
}
function sv(){localStorage.setItem("cr3",JSON.stringify(saved));document.getElementById("t2").textContent=`📋 저장 리스트 (${saved.length})`;}
function drwSaved(){
  document.getElementById("ss").innerHTML=[
    ["전체",saved.length,"#1e40af"],
    ["상장",saved.filter(c=>c.listed).length,"#1d4ed8"],
    ["비상장",saved.filter(c=>!c.listed).length,"#64748b"],
  ].map(([l,n,c])=>`<div class="sc" style="border-left:4px solid ${c}"><div class="n" style="color:${c}">${n}</div><div class="l">${l}</div></div>`).join("");
  if(!saved.length){document.getElementById("sl").innerHTML=`<div class="empty"><div style="font-size:36px">📋</div><p style="margin-top:8px">검색 탭에서 저장해보세요!</p></div>`;return;}
  document.getElementById("sl").innerHTML=saved.map(c=>`
    <div class="co sv">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
        <div>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span style="font-weight:800;font-size:15px;color:#0f172a">${c.name}</span>
            ${c.listed?`<span class="tag" style="background:#eff6ff;color:#1d4ed8">📈 상장</span>`:""}
            <span class="tag" style="background:#e0e7ff;color:#3730a3">${c.ind}</span>
          </div>
          <div class="mt">
            <div><div class="l">매출</div><div class="v" style="color:#f59e0b">${fmt(c.revenue)}</div></div>
            <div><div class="l">임직원</div><div class="v" style="color:#0ea5e9">${c.emp.toLocaleString()}명</div></div>
          </div>
        </div>
        <button class="btn bre bs" onclick="rmSv('${c.id}')">삭제</button>
      </div>
    </div>`).join("");
}
function rmSv(id){saved=saved.filter(c=>c.id!==id);sv();drwSaved();}
function clrAll(){if(confirm("전체 삭제할까요?")){saved=[];sv();drwSaved();}}
function expCSV(){
  const rows=[["기업명","업종","지역","상장","매출(백만)","임직원","설립연도"]];
  saved.forEach(c=>rows.push([c.name,c.ind,c.region,c.listed?"상장":"비상장",c.revenue,c.emp,c.founded]));
  const csv=rows.map(r=>r.map(v=>`"${v}"`).join(",")).join("\n");
  const b=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="기업리스트.csv";a.click();
}
function switchTab(t){
  document.getElementById("ps").style.display=t==="search"?"block":"none";
  document.getElementById("pv").style.display=t==="saved"?"block":"none";
  document.getElementById("t1").className="tab"+(t==="search"?" active":"");
  document.getElementById("t2").className="tab"+(t==="saved"?" active":"");
  if(t==="saved")drwSaved();
}
